<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>الملف الشخصي | أكاديمية نبراس</title>
    <link rel="icon" type="image/png" href="../../assets/img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../../assets/css/admin.css" />
    <style>
        .profile-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-radius: 0 0 40px 40px;
            margin-bottom: -40px;
            position: relative;
            z-index: 1;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--primary);
            border: 5px solid rgba(255,255,255,0.2);
        }
        .profile-container {
            max-width: 1000px;
            margin: 0 auto 60px;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }
        .profile-info-grid {
            display: grid;
            grid-template-columns: 1fr 2.5fr;
            gap: 25px;
        }
        .info-card {
            background: white;
            padding: 25px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }
        .course-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .course-badge {
            background: rgba(122, 28, 40, 0.1);
            color: var(--primary);
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .profile-info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <div class="profile-header">
        <div class="profile-avatar">
            <i class="fas fa-user-graduate"></i>
        </div>
        <h1 id="profName">...</h1>
        <p id="profEmail">...</p>
    </div>

    <div class="profile-container">
        <div class="profile-info-grid">
            <!-- Sidebar Info -->
            <div class="info-card">
                <div class="section-header">
                    <h2><i class="fas fa-id-card"></i> البيانات</h2>
                </div>
                <div class="input-group">
                    <label>الاسم الكامل</label>
                    <p id="infoName" style="font-weight: 700;">...</p>
                </div>
                <div class="input-group">
                    <label>رقم الهاتف</label>
                    <p id="infoPhone">...</p>
                </div>
                <div class="input-group">
                    <label>تاريخ التسجيل</label>
                    <p id="infoJoined">...</p>
                </div>
                <button onclick="window.logout()" class="login-btn" style="background: #fff0f0; color: #b42318; box-shadow: none; border: 1px solid #ffd6d6; margin-top: 20px;">تسجيل الخروج</button>
                <a href="../../index.html" class="nav-link" style="text-align: center; margin-top: 10px; color: var(--primary);"><i class="fas fa-home"></i> العودة للرئيسية</a>
            </div>

            <!-- Main Content -->
            <div class="main-profile">
                <!-- Courses -->
                <div class="info-card" style="margin-bottom: 25px;">
                    <div class="section-header">
                        <h2><i class="fas fa-graduation-cap"></i> الدورات والبرامج المسجلة</h2>
                    </div>
                    <div id="courseContainer" class="course-list">
                        <p style="color: var(--text-muted);">لا توجد دورات مسجلة حالياً.</p>
                    </div>
                </div>

                <!-- Certificates -->
                <div class="info-card">
                    <div class="section-header">
                        <h2><i class="fas fa-award"></i> الشهادات المعتمدة</h2>
                    </div>
                    <div id="certsContainer" class="table-container">
                        <p style="text-align:center; padding:40px; color: var(--text-muted);">جاري تحميل الشهادات...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="../../assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/auth/profile');
                if (!response.ok) throw new Error('Unauthorized');
                const data = await response.json();
                const user = data.user;
                const certs = data.certificates;

                document.getElementById('profName').textContent = user.name;
                document.getElementById('profEmail').textContent = user.email;
                document.getElementById('infoName').textContent = user.name;
                document.getElementById('infoPhone').textContent = user.phone || 'غير مسجل';
                document.getElementById('infoJoined').textContent = new Date(user.createdAt).toLocaleDateString('ar-EG');

                // Enrolled Courses
                const courseContainer = document.getElementById('courseContainer');
                if (user.enrolledCourses && user.enrolledCourses.length > 0) {
                    courseContainer.innerHTML = user.enrolledCourses.map(c => `<span class="course-badge">${c}</span>`).join('');
                }

                // Certificates
                const certsContainer = document.getElementById('certsContainer');
                if (!certs || certs.length === 0) {
                    certsContainer.innerHTML = '<p style="text-align:center; padding:20px; color: var(--text-muted);">لم يتم ربط أي شهادات بحسابك حتى الآن.</p>';
                } else {
                    const rows = certs.map(c => `
                        <tr>
                            <td data-label="البرنامج">${c.program_name}</td>
                            <td data-label="رقم الشهادة">${c.cert_num}</td>
                            <td data-label="التاريخ">${c.issue_date}</td>
                            <td data-label="تحميل">
                                ${c.pdf_url ? `<a href="${c.pdf_url}" target="_blank" class="badge admin" style="text-decoration:none;"><i class="fas fa-file-pdf"></i> PDF</a>` : '---'}
                            </td>
                        </tr>
                    `).join('');
                    certsContainer.innerHTML = `
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>البرنامج</th>
                                    <th>رقم الشهادة</th>
                                    <th>التاريخ</th>
                                    <th>تحميل</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    `;
                }

            } catch (err) {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>

</html>
