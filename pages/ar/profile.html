<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حسابي | أكاديمية نبراس</title>
  <meta name="description" content="أكاديمية نبراس - الصفحة الشخصية للمستخدم" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .profile-section { padding: 120px 0 60px; background: #f8f9fa; min-height: 80vh; }
    .profile-card { background: white; border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; }
    .profile-header { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
    .profile-avatar { width: 80px; height: 80px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; }
    .profile-info h2 { color: var(--text-main); margin-bottom: 5px; }
    .profile-info p { color: var(--text-muted); margin: 0; }
    .profile-details { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .detail-item { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 10px; }
    .detail-label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 5px; display: block; }
    .detail-value { font-size: 1.1rem; color: var(--text-main); font-weight: 600; }
    @media (max-width: 600px) { .profile-details { grid-template-columns: 1fr; } }
    .logout-btn { background: #ffebee; color: #d32f2f; padding: 10px 20px; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; transition: 0.3s; margin-top: 30px; display: inline-block; text-decoration: none; }
    .logout-btn:hover { background: #ffcdd2; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav id="navbar" class="navbar scrolled">
    <div class="nav-container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/img/logo.png" alt="أكاديمية نبراس" />
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="../../index.html" class="nav-link">الرئيسية</a></li>
        <li><a href="programs.html" class="nav-link">البرامج</a></li>
        <li><button onclick="window.logout()" class="nav-btn" style="background:#d32f2f;">تسجيل الخروج</button></li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="القائمة">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="../../index.html">الرئيسية</a></li>
      <li><a href="programs.html">البرامج</a></li>
      <li><button onclick="window.logout()" class="mobile-btn" style="background:#d32f2f;">تسجيل الخروج</button></li>
    </ul>
  </div>

  <!-- Profile Section -->
  <section class="profile-section">
    <div class="container">
      <div class="profile-card" id="profileContent">
        <div style="text-align:center; padding: 50px;">
          <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary-color);"></i>
          <p style="margin-top: 15px;">جاري تحميل بيانات الحساب...</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="../../assets/js/script.js" defer></script>
</body>
</html>
