<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إعادة تعيين كلمة المرور | أكاديمية نبراس</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav id="navbar" class="navbar scrolled">
    <div class="nav-container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/img/logo.png" alt="أكاديمية نبراس" />
      </a>
    </div>
  </nav>

  <!-- Auth Section -->
  <section class="auth-section" style="padding-top: 150px; padding-bottom: 100px;">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo"><img src="../../assets/img/logo.png" alt="أكاديمية نبراس"></div>
        <h2>تعيين كلمة مرور جديدة</h2>
        <p>الرجاء إدخال كلمة المرور الجديدة الخاصة بك.</p>
        <form class="auth-form" id="resetPasswordForm">
          <div class="form-group">
            <label>كلمة المرور الجديدة</label>
            <input type="password" id="resetPassword" placeholder="••••••••" required />
          </div>
          <div class="form-group">
            <label>تأكيد كلمة المرور</label>
            <input type="password" id="resetConfirmPassword" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-primary auth-btn">تغيير كلمة المرور</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="../../assets/js/script.js" defer></script>
</body>
</html>
