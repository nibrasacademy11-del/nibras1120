<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إتمام الدفع | أكاديمية نبراس</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .checkout-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-top: 40px;
    }
    .checkout-box {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }
    .checkout-box h3 {
        color: var(--primary-color);
        margin-bottom: 20px;
        border-bottom: 2px solid var(--bg-surface);
        padding-bottom: 10px;
    }
    .order-summary-item {
        display: flex;
        justify-content: space-between;
        padding: 15px 0;
        border-bottom: 1px solid #eee;
    }
    .order-total {
        display: flex;
        justify-content: space-between;
        padding: 20px 0;
        font-size: 1.3rem;
        font-weight: bold;
        color: var(--primary-dark);
        border-top: 2px solid #ddd;
        margin-top: 10px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-color);
        font-weight: 600;
    }
    .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: inherit;
        font-size: 1rem;
    }
    @media (max-width: 768px) {
        .checkout-container {
            grid-template-columns: 1fr;
        }
    }
  </style>
</head>
<body>

        <!-- Cart Sidebar -->
        <div id="cartSidebar" class="cart-sidebar">
            <div class="cart-header">
                <h3><i class="fas fa-shopping-cart"></i> سلة المشتريات</h3>
                <button onclick="toggleCart(event)" class="close-cart">&times;</button>
            </div>
            <div id="cartItems" class="cart-items">
                <!-- Items will be injected here -->
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>الإجمالي:</span>
                    <strong id="cartTotal">0.00 US$</strong>
                </div>
                <a href="checkout.html" class="btn-primary" style="width:100%; text-align:center; margin-top:15px; text-decoration:none;">إتمام الدفع <i class="fas fa-credit-card"></i></a>
            </div>
        </div>
        <div id="cartOverlay" class="cart-overlay" onclick="toggleCart(event)"></div>
        
  <!-- Navbar -->
  <nav id="navbar" class="navbar scrolled">
    <div class="nav-container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/img/logo.png" alt="أكاديمية نبراس" />
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="../../index.html" class="nav-link">الرئيسية</a></li>
        <li><a href="about.html" class="nav-link">عن الأكاديمية</a></li>
        <li><a href="programs.html" class="nav-link">البرامج والخدمات</a></li>
        <li><a href="articles.html" class="nav-link">المقالات</a></li>
        
        <li><a href="contact.html" class="nav-link">تواصل معنا</a></li>
      </ul>
    </div>
  </nav>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1>إتمام الدفع</h1>
      <p>أكمل بياناتك لإتمام عملية التسجيل والدفع بشكل آمن.</p>
    </div>
  </section>

  <!-- Checkout Section -->
  <section class="checkout-section" style="padding: 80px 0; background: var(--bg-surface);">
    <div class="container">
      <div class="checkout-container">
        
        <!-- Form -->
        <div class="checkout-box">
            <h3><i class="fas fa-user-edit"></i> بيانات المتدرب</h3>
            <form id="checkoutForm">
                <div class="form-group">
                    <label>الاسم الرباعي (كما سيكتب في الشهادة)</label>
                    <input type="text" id="chkName" required placeholder="أدخل اسمك بالكامل">
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="chkEmail" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف (واتساب)</label>
                    <input type="tel" id="chkPhone" required placeholder="+201234567890">
                </div>
                <div class="form-group">
                    <label>الدولة</label>
                    <input type="text" id="chkCountry" required placeholder="مصر، السعودية، الإمارات...">
                </div>
                
                <h3 style="margin-top:30px;"><i class="fas fa-credit-card"></i> طريقة الدفع</h3>
                <div style="background: #f8f9fa; padding:15px; border-radius:8px; border:1px solid #ddd; margin-bottom:20px;">
                    <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                        <input type="radio" name="paymentMethod" checked>
                        <span>الدفع الإلكتروني (البطاقة الائتمانية / بوابة الدفع)</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary" style="width:100%; font-size:1.1rem; padding:15px;">تأكيد الدفع <i class="fas fa-lock"></i></button>
            </form>
        </div>

        <!-- Order Summary -->
        <div class="checkout-box">
            <h3><i class="fas fa-receipt"></i> ملخص الطلب</h3>
            <div id="checkoutItems">
                <!-- Items injected by JS -->
            </div>
            <div class="order-total">
                <span>الإجمالي الكلي:</span>
                <span id="checkoutTotal">0.00 US$</span>
            </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="../../assets/js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const cartItems = JSON.parse(localStorage.getItem('nibras_cart')) || [];
        const checkoutItemsContainer = document.getElementById('checkoutItems');
        const checkoutTotalElement = document.getElementById('checkoutTotal');
        
        if (cartItems.length === 0) {
            checkoutItemsContainer.innerHTML = '<p style="text-align:center; color:red; margin:20px 0;">السلة فارغة. يرجى إضافة برامج أولاً.</p>';
            checkoutTotalElement.innerText = '0.00 US$';
            document.querySelector('#checkoutForm button').disabled = true;
            return;
        }
        
        let html = '';
        let total = 0;
        
        cartItems.forEach(item => {
            total += item.price;
            html += `
            <div class="order-summary-item">
                <span style="font-weight:600; color:var(--text-color); max-width:70%;">${item.title}</span>
                <span style="color:var(--primary-color); font-weight:bold;">${item.price}.00 US$</span>
            </div>
            `;
        });
        
        checkoutItemsContainer.innerHTML = html;
        checkoutTotalElement.innerText = `${total}.00 US$`;
    });
    
    document.getElementById('checkoutForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحويل לבوابة الدفع...';
        btn.disabled = true;
        
        // This is where you integrate the Payment Gateway (Stripe, Paymob, etc.)
        setTimeout(() => {
            showToast('هذه نسخة تجريبية. سيتم ربط بوابة الدفع هنا قريباً.');
            btn.innerHTML = 'تأكيد الدفع <i class="fas fa-lock"></i>';
            btn.disabled = false;
        }, 2000);
    });
  </script>

    <!-- Floating Cart Button -->
    <div class="floating-cart" onclick="toggleCart(event)">
        <i class="fas fa-shopping-cart"></i>
        <span class="floating-cart-badge cart-badge">0</span>
    </div>
            
</body>
</html>
