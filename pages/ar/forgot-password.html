<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نسيت كلمة المرور | أكاديمية نبراس</title>
  <meta name="description" content="أكاديمية نبراس - استعادة كلمة المرور" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
</head>
<body>

  <!-- Navbar (Simplified for Auth pages) -->
  <nav id="navbar" class="navbar scrolled">
    <div class="nav-container">
      <a href="../../index.html" class="nav-logo">
        <img src="../../assets/img/logo.png" alt="أكاديمية نبراس" />
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="../../index.html" class="nav-link">الرئيسية</a></li>
        <li><a href="login.html" class="nav-btn">تسجيل الدخول</a></li>
      </ul>
    </div>
  </nav>

  <!-- Auth Section -->
  <section class="auth-section" style="padding-top: 150px; padding-bottom: 100px;">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo"><img src="../../assets/img/logo.png" alt="أكاديمية نبراس"></div>
        <h2>استعادة كلمة المرور</h2>
        <p>أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.</p>
        <form class="auth-form" id="forgotPasswordForm">
          <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="forgotEmail" placeholder="example@email.com" required />
          </div>
          <button type="submit" class="btn-primary auth-btn">إرسال رابط الاستعادة</button>
        </form>
        <div class="auth-footer" style="text-align: center; margin-top: 25px;">
          تذكرت كلمة المرور؟ <a href="login.html" style="color: var(--primary-color); font-weight: 700;">تسجيل الدخول</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="../../assets/js/script.js" defer></script>
</body>
</html>
