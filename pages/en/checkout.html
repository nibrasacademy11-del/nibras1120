<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Nibras Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <style>
    .checkout-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-top: 40px;
    }
    .checkout-box {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }
    .checkout-box h3 {
        color: var(--primary-color);
        margin-bottom: 20px;
        border-bottom: 2px solid var(--bg-surface);
        padding-bottom: 10px;
    }
    .order-summary-item {
        display: flex;
        justify-content: space-between;
        padding: 15px 0;
        border-bottom: 1px solid #eee;
    }
    .order-total {
        display: flex;
        justify-content: space-between;
        padding: 20px 0;
        font-size: 1.3rem;
        font-weight: bold;
        color: var(--primary-dark);
        border-top: 2px solid #ddd;
        margin-top: 10px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-color);
        font-weight: 600;
    }
    .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: inherit;
        font-size: 1rem;
    }
    @media (max-width: 768px) {
        .checkout-container {
            grid-template-columns: 1fr;
        }
    }
  </style>
</head>
<body>

        <!-- Cart Sidebar -->
        <div id="cartSidebar" class="cart-sidebar">
            <div class="cart-header">
                <h3><i class="fas fa-shopping-cart"></i> Shopping Cart</h3>
                <button onclick="toggleCart(event)" class="close-cart">&times;</button>
            </div>
            <div id="cartItems" class="cart-items">
                <!-- Items will be injected here -->
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <strong id="cartTotal">0.00 US$</strong>
                </div>
                <a href="checkout.html" class="btn-primary" style="width:100%; text-align:center; margin-top:15px; text-decoration:none;">Checkout <i class="fas fa-credit-card"></i></a>
            </div>
        </div>
        <div id="cartOverlay" class="cart-overlay" onclick="toggleCart(event)"></div>
        
  <!-- Navbar -->
  <nav id="navbar" class="navbar scrolled">
    <div class="nav-container">
      <a href="../../en/index.html" class="nav-logo">
        <img src="../../assets/img/logo.png" alt="Nibras Academy" />
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="../../en/index.html" class="nav-link">Home</a></li>
        <li><a href="about.html" class="nav-link">About Us</a></li>
        <li><a href="programs.html" class="nav-link">Programs & Services</a></li>
        <li><a href="articles.html" class="nav-link">Articles</a></li>
        <li><a href="contact.html" class="nav-link">Contact Us</a></li>
      </ul>
    </div>
  </nav>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1>Checkout</h1>
      <p>Complete your details to finish registration and payment securely.</p>
    </div>
  </section>

  <!-- Checkout Section -->
  <section class="checkout-section" style="padding: 80px 0; background: var(--bg-surface);">
    <div class="container">
      <div class="checkout-container">
        
        <!-- Form -->
        <div class="checkout-box">
            <h3><i class="fas fa-user-edit"></i> Student Information</h3>
            <form id="checkoutForm">
                <div class="form-group">
                    <label>Full Name (as it will appear on the certificate)</label>
                    <input type="text" id="chkName" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="chkEmail" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>Phone Number (WhatsApp)</label>
                    <input type="tel" id="chkPhone" required placeholder="+1234567890">
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" id="chkCountry" required placeholder="Your Country">
                </div>
                
                <h3 style="margin-top:30px;"><i class="fas fa-headset"></i> Payment Method</h3>
                <div style="background: #f8f9fa; padding:15px; border-radius:8px; border:1px solid #ddd; margin-bottom:20px;">
                    <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                        <input type="radio" name="paymentMethod" checked>
                        <span>Complete payment with a Customer Service representative (via WhatsApp)</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary" style="width:100%; font-size:1.1rem; padding:15px;">Confirm Order & Checkout <i class="fab fa-whatsapp"></i></button>
            </form>
        </div>

        <!-- Order Summary -->
        <div class="checkout-box">
            <h3><i class="fas fa-receipt"></i> Order Summary</h3>
            <div id="checkoutItems">
                <!-- Items injected by JS -->
            </div>
            <div class="order-total">
                <span>Grand Total:</span>
                <span id="checkoutTotal">0.00 US$</span>
            </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="../../assets/js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const cartItems = JSON.parse(localStorage.getItem('nibras_cart')) || [];
        const checkoutItemsContainer = document.getElementById('checkoutItems');
        const checkoutTotalElement = document.getElementById('checkoutTotal');
        
        if (cartItems.length === 0) {
            checkoutItemsContainer.innerHTML = '<p style="text-align:center; color:red; margin:20px 0;">Cart is empty. Please add programs first.</p>';
            checkoutTotalElement.innerText = '0.00 US$';
            document.querySelector('#checkoutForm button').disabled = true;
            return;
        }
        
        let html = '';
        let total = 0;
        
        cartItems.forEach(item => {
            const itemTotal = (item.price * (item.qty || 1));
            total += itemTotal;
            html += `
            <div class="order-summary-item">
                <span style="font-weight:600; color:var(--text-color); max-width:70%;">${item.name}</span>
                <span style="color:var(--primary-color); font-weight:bold;">${itemTotal}.00 US$</span>
            </div>
            `;
        });
        
        checkoutItemsContainer.innerHTML = html;
        checkoutTotalElement.innerText = `${total}.00 US$`;
    });
    
    document.getElementById('checkoutForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const name = document.getElementById('chkName').value;
        const email = document.getElementById('chkEmail').value;
        const phone = document.getElementById('chkPhone').value;
        const country = document.getElementById('chkCountry').value;
        
        const cartItems = JSON.parse(localStorage.getItem('nibras_cart')) || [];
        let total = 0;
        let programsList = "";
        
        cartItems.forEach((item, index) => {
            const itemTotal = item.price * (item.qty || 1);
            total += itemTotal;
            programsList += `${index + 1}- ${item.name} (${itemTotal} US$)\n`;
        });
        
        const whatsappMessage = `New subscription request from the Academy:\n\n` +
                                `*Student Information:*\n` +
                                `- Name: ${name}\n` +
                                `- Email: ${email}\n` +
                                `- Phone: ${phone}\n` +
                                `- Country: ${country}\n\n` +
                                `*Selected Programs:*\n${programsList}\n` +
                                `*Grand Total: ${total}.00 US$*`;
                                
        const encodedMessage = encodeURIComponent(whatsappMessage);
        const whatsappUrl = `https://wa.me/201112220796?text=${encodedMessage}`;
        
        const btn = e.target.querySelector('button');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Opening WhatsApp...';
        btn.disabled = true;
        
        setTimeout(() => {
            window.open(whatsappUrl, '_blank');
            btn.innerHTML = 'Confirm Order & Checkout <i class="fab fa-whatsapp"></i>';
            btn.disabled = false;
            showToast('Redirecting to WhatsApp to complete payment.');
        }, 1000);
    });
  </script>

    <!-- Floating Cart Button -->
    <div class="floating-cart" onclick="toggleCart(event)">
        <i class="fas fa-shopping-cart"></i>
        <span class="floating-cart-badge cart-badge">0</span>
    </div>
            
</body>
</html>
