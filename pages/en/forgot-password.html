<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Nibras Academy</title>
  <meta name="description" content="Nibras Academy - Reset your password" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
</head>
<body>

  <!-- Navbar (Simplified for Auth pages) -->
  <nav id="navbar" class="navbar scrolled">
    <div class="nav-container">
      <a href="../../en/index.html" class="nav-logo">
        <img src="../../assets/img/logo.png" alt="Nibras Academy" />
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="../../en/index.html" class="nav-link">Home</a></li>
        <li><a href="login.html" class="nav-btn">Login</a></li>
      </ul>
    </div>
  </nav>

  <!-- Auth Section -->
  <section class="auth-section" style="padding-top: 150px; padding-bottom: 100px;">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo"><img src="../../assets/img/logo.png" alt="Nibras Academy"></div>
        <h2>Forgot Password</h2>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
        <form class="auth-form" id="forgotPasswordForm">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="forgotEmail" placeholder="example@email.com" required />
          </div>
          <button type="submit" class="btn-primary auth-btn">Send Reset Link</button>
        </form>
        <div class="auth-footer" style="text-align: center; margin-top: 25px;">
          Remembered your password? <a href="login.html" style="color: var(--primary-color); font-weight: 700;">Login</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="../../assets/js/script.js" defer></script>
</body>
</html>
